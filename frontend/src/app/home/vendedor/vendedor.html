<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">
  <div class="d-flex justify-content-between align-items-center mb-3 bg-white border rounded-pill px-4" style="height: 60px; flex-shrink: 0;">
    <div class="fw-bold" style="font-size: 14px; color: #555;">
      Rol: <span style="color: #17a2b8;">Vendedor</span>
    </div>

    <div class="fw-bold text-dark" style="font-size: 16px;">
  <span class="me-2">Bienvenido:</span><span class="text-secondary">{{ nombre }}</span>
  </div>

    <div class="logout-btn d-flex align-items-center" (click)="logout()">
      <span class="me-2 fw-bold text-danger" style="font-size: 14px;">Cerrar Sesión</span>
      <i class="fas fa-sign-out-alt text-danger" style="font-size: 22px;"></i>
    </div>
  </div>

  <div class="modulos-grid grid-vendedor">

    <div class="modulo-card" (click)="navigateTo('pedido')">
      <i class="fas fa-cart-plus icon-necho"></i>
      <div class="mt-3 text-label">Realizar Pedido</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('consulta-producto')">
      <i class="fas fa-boxes icon-necho"></i>
      <div class="mt-3 text-label">Ver Productos</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('clientes')">
      <i class="fas fa-address-book icon-necho"></i>
      <div class="mt-3 text-label">Gestionar Clientes</div>
    </div>

  </div>
</div>
