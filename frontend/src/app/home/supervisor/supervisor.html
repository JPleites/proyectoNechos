<div class="container-fluid overflow-hidden" style="height: 100vh; display: flex; flex-direction: column; padding: 12px; box-sizing: border-box; background-color: #f8f9fa;">
  
  <div class="d-flex justify-content-between align-items-center mb-3" style="padding: 0 10px; background: #fff; border: 1px solid #dee2e6; border-radius: 15px; height: 60px;">
    
    <div class="fw-bold" style="font-size: 14px; color: #555;">
      Rol: <span style="color: #28a745;">Supervisor</span>
    </div>

    <div class="fw-bold text-dark" style="font-size: 16px;">
      Bienvenido: <span class="text-secondary">[Nombre de Usuario]</span>
    </div>

    <div class="d-flex align-items-center" style="cursor: pointer; padding: 5px 12px; border-radius: 10px; transition: 0.3s;" 
         onmouseover="this.style.background='#fff0f0'" onmouseout="this.style.background='transparent'">
      <span class="me-2 fw-bold" style="font-size: 14px; color: #dc3545;">Cerrar Sesión</span>
      <img src="/logout.png" alt="Logout" style="width: 24px; height: 24px; object-fit: contain;">
    </div>

  </div>

  <div style="display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 12px; flex-grow: 1;">

    <div class="text-center fw-bold d-flex flex-column align-items-center justify-content-center" style="background: #fff; border: 1px solid #dee2e6; border-radius: 15px; cursor: pointer; padding: 10px;">
      <img src="/usuario.png" alt="Usuarios" style="width: 60px; height: 60px; object-fit: contain;">
      <div class="mt-2" style="font-size: 14px;">Ver/Crear Usuarios</div>
    </div>

    <div class="text-center fw-bold d-flex flex-column align-items-center justify-content-center" style="background: #fff; border: 1px solid #dee2e6; border-radius: 15px; cursor: pointer; padding: 10px;">
      <img src="/arqueo.png" alt="Arqueos" style="width: 60px; height: 60px; object-fit: contain;">
      <div class="mt-2" style="font-size: 14px;">Arqueos</div>
    </div>

    <div class="text-center fw-bold d-flex flex-column align-items-center justify-content-center" style="background: #fff; border: 1px solid #dee2e6; border-radius: 15px; cursor: pointer; padding: 10px;">
      <img src="/productos.png" alt="Productos" style="width: 60px; height: 60px; object-fit: contain;">
      <div class="mt-2" style="font-size: 14px;">Productos</div>
    </div>

    <div class="text-center fw-bold d-flex flex-column align-items-center justify-content-center" style="background: #fff; border: 1px solid #dee2e6; border-radius: 15px; cursor: pointer; padding: 10px;">
      <img src="/clientes.png" alt="Clientes" style="width: 60px; height: 60px; object-fit: contain;">
      <div class="mt-2" style="font-size: 14px;">Clientes</div>
    </div>

    <div class="text-center fw-bold d-flex flex-column align-items-center justify-content-center" style="background: #fff; border: 1px solid #dee2e6; border-radius: 15px; cursor: pointer; padding: 10px;">
      <img src="/inventario_.png" alt="Inventario" style="width: 60px; height: 60px; object-fit: contain;">
      <div class="mt-2" style="font-size: 14px;">Inventario</div>
    </div>

    <div class="text-center fw-bold d-flex flex-column align-items-center justify-content-center" style="background: #fff; border: 1px solid #dee2e6; border-radius: 15px; cursor: pointer; padding: 10px;">
      <img src="/facturacion.png" alt="Facturación" style="width: 60px; height: 60px; object-fit: contain;">
      <div class="mt-2" style="font-size: 14px;">Facturación</div>
    </div>

    <div class="text-center fw-bold d-flex flex-column align-items-center justify-content-center" 
         style="background: #fff; border: 1px solid #dee2e6; border-radius: 15px; cursor: pointer; padding: 10px; grid-column: 2;">
      <img src="/cierre.png" alt="Cierres" style="width: 60px; height: 60px; object-fit: contain;">
      <div class="mt-2" style="font-size: 14px;">Cierres</div>
    </div>

  </div>
</div>
