<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">
  <div class="d-flex justify-content-between align-items-center mb-3 bg-white border rounded-pill px-4" style="height: 60px; flex-shrink: 0;">
    <div class="fw-bold" style="font-size: 14px; color: #555;">
      Rol: <span style="color: #28a745;">Supervisor</span>
    </div>

    <div class="fw-bold text-dark" style="font-size: 16px;">
  <span class="me-2">Bienvenido:</span><span class="text-secondary">{{ nombre }}</span>
  </div>

    <div class="logout-btn d-flex align-items-center" (click)="logout()">
      <span class="me-2 fw-bold text-danger" style="font-size: 14px;">Cerrar Sesión</span>
      <i class="fas fa-sign-out-alt text-danger" style="font-size: 22px;"></i>
    </div>
  </div>

  <div class="modulos-grid grid-supervisor">

    <div class="modulo-card" (click)="navigateTo('usuarios')">
      <i class="fas fa-user-cog icon-necho"></i>
      <div class="mt-2 text-label">Ver/Crear Usuarios</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('clientes')">
      <i class="fas fa-address-card icon-necho"></i>
      <div class="mt-2 text-label">Clientes</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('inventario')">
      <i class="fas fa-clipboard-check icon-necho"></i>
      <div class="mt-2 text-label">Inventario</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('productos')">
      <i class="fas fa-boxes icon-necho"></i>
      <div class="mt-2 text-label">Productos</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('pedido')">
      <i class="fas fa-cash-register icon-necho"></i>
      <div class="mt-2 text-label">Pedidos</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('caja')">
      <i class="fas fa-file-invoice-dollar icon-necho"></i>
      <div class="mt-2 text-label">Caja</div>
    </div>

    <div class="modulo-card card-centrada" (click)="navigateTo('cierres')">
      <i class="fas fa-store-slash icon-necho"></i>
      <div class="mt-2 text-label">Cierres</div>
    </div>

  </div>
</div>
