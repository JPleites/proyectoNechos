<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light overflow-hidden">
  
  <!-- Header (Sin cambios) -->
  <div class="d-flex justify-content-between align-items-center mb-3 bg-white border rounded-pill px-4" style="height: 60px;">
    <div class="fw-bold" style="font-size: 14px; color: #555;">
      Rol: <span class="text-primary">Admin</span>
    </div>
    <div class="fw-bold text-dark">
      Bienvenido: <span class="text-secondary">[Nombre de Usuario]</span>
    </div>
    <div class="d-flex align-items-center" style="cursor: pointer;" (click)="logout()">
      <span class="me-2 fw-bold text-danger" style="font-size: 13px;">Cerrar Sesión</span>
      <i class="fas fa-sign-out-alt text-danger" style="font-size: 20px;"></i>
    </div>
  </div>

  <!-- Grid de Módulos -->
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 10px; flex-grow: 1;">

    <div class="modulo-card" (click)="navigateTo('usuarios')">
      <i class="fas fa-users icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Usuarios</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('ubicaciones')">
      <i class="fas fa-map-marker-alt icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Ubicaciones</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('perfiles')">
      <i class="fas fa-id-card icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Perfiles</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('arqueos')">
      <i class="fas fa-cash-register icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Arqueos</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('productos')">
      <i class="fas fa-box-open icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Productos</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('categorias')">
      <i class="fas fa-tags icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Categorías</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('clientes')">
      <i class="fas fa-user-tie icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Clientes</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('almacenes')">
      <i class="fas fa-warehouse icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Almacenes</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('inventario')">
      <i class="fas fa-clipboard-list icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Inventario</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('proveedores')">
      <i class="fas fa-truck-loading icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Proveedores</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('facturacion')">
      <i class="fas fa-file-invoice-dollar icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Facturación</div>
    </div>

    <div class="modulo-card" (click)="navigateTo('cierres')">
      <i class="fas fa-lock icon-necho"></i>
      <div class="mt-2" style="font-size: 13px; font-weight: bold;">Cierres</div>
    </div>

  </div>
</div>
