<div
  class="container-fluid overflow-hidden"
  style="
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 12px;
    box-sizing: border-box;
    background-color: #f8f9fa;
  "
>
  <!-- Header con estilo Cajero -->
  <div
    class="d-flex justify-content-between align-items-center mb-3"
    style="
      padding: 0 20px;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 15px;
      height: 60px;
    "
  >
    <div class="fw-bold" style="font-size: 14px; color: #555">
      Rol: <span style="color: #f39c12">Cajero</span>
    </div>

    <div class="fw-bold text-dark" style="font-size: 16px">
      Bienvenido: <span class="text-secondary">[Nombre de Usuario]</span>
    </div>

    <div
      class="d-flex align-items-center"
      style="cursor: pointer; padding: 5px 12px; border-radius: 10px; transition: 0.3s"
      onmouseover="this.style.background = '#fff0f0'"
      onmouseout="this.style.background = 'transparent'"
      (click)="logout()"
    >
      <span class="me-2 fw-bold" style="font-size: 14px; color: #dc3545">Cerrar Sesión</span>
      <i class="fas fa-sign-out-alt text-danger" style="font-size: 22px"></i>
    </div>
  </div>

  <!-- Grid de Módulos (2x2) -->
  <div
    style="
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 15px;
      flex-grow: 1;
    "
  >
    <!-- Facturación -->
    <div class="modulo-card" (click)="navigateTo('caja')">
      <i class="fas fa-file-invoice-dollar icon-necho"></i>
      <div class="mt-3" style="font-size: 18px; font-weight: bold">Facturación</div>
    </div>

    <!-- Consulta de Productos -->
    <div class="modulo-card" (click)="navigateTo('productos/consulta')">
      <i class="fas fa-search icon-necho"></i>
      <div class="mt-3" style="font-size: 18px; font-weight: bold">Consulta de Productos</div>
    </div>

    <!-- Clientes -->
    <div class="modulo-card" (click)="navigateTo('clientes')">
      <i class="fas fa-user-tag icon-necho"></i>
      <div class="mt-3" style="font-size: 18px; font-weight: bold">Clientes</div>
    </div>

    <!-- Realizar Cierre -->
    <div class="modulo-card" (click)="navigateTo('cierres')">
      <i class="fas fa-cash-register icon-necho"></i>
      <div class="mt-3" style="font-size: 18px; font-weight: bold">Realizar Cierre</div>
    </div>
  </div>
</div>
