<div class="container py-4">
  <div class="card shadow-sm">
    <!-- HEADER -->
    <div class="card-body d-flex justify-content-between align-items-center">
      <div>
        <h4 class="mb-0">Marcas</h4>
        <small class="text-muted">Listado de marcas registradas</small>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="card-body pt-0">
      <div class="input-group mb-3">
        <input
          type="text"
          class="form-control"
          (input)="buscar()"
          placeholder="Buscar marca o proveedor..."
        />
        <button class="btn btn-outline-primary" (click)="buscar()">Buscar</button>
      </div>

      <!-- TABLE -->
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>Marca</th>
              <th>Código</th>
              <th>Proveedor</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let m of marcasFiltradas">
              <td class="fw-semibold">
                {{ m.nombre }}
              </td>

              <td>
                <span class="badge bg-dark">
                  {{ m.marcaID }}
                </span>
              </td>

              <td>
                <i class="fas fa-truck text-muted me-2"></i>
                {{ m.proveedorRel?.proveedor }}
              </td>
            </tr>

          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
