<section class="container-fluid py-4 bg-body-tertiary min-vh-100">
  <!-- HEADER -->
  <header class="mb-4">
    <h4 class="mb-1 fw-semibold">Marcas</h4>

    <small class="text-muted"> Listado de marcas registradas </small>
  </header>

  <!-- CARD -->
  <article class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <!-- SEARCH -->
    <div class="card-body border-bottom">
      <div class="input-group">
        <input
          type="text"
          class="form-control"
          placeholder="Buscar marca o proveedor..."
          (input)="buscar()"
        />

        <button class="btn btn-primary" (click)="buscar()">Buscar</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <!-- HEADER -->
        <thead class="table-light">
          <tr>
            <th class="erp-th ps-4">Marca</th>

            <th class="erp-th">Código</th>

            <th class="erp-th pe-4">Proveedor</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>
          <tr *ngFor="let m of marcasFiltradas">
            <td class="fw-medium text-dark ps-4">
              {{ m.nombre }}
            </td>

            <td>
              <span class="erp-badge erp-badge-secondary">
                {{ m.marcaID }}
              </span>
            </td>

            <td class="text-muted pe-4">
              <i class="fas fa-truck me-2"></i>
              {{ m.proveedorRel?.proveedor }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </article>
</section>
