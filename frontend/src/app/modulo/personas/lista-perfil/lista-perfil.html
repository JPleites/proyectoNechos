<section class="container-fluid py-4 bg-body-tertiary min-vh-100">
  <!-- HEADER -->
  <header class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-1 fw-semibold">Colaboradores</h4>

      <small class="text-muted"> Gestión de perfiles y accesos </small>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-light border rounded-3 px-3" (click)="cargar()">
        <i class="fas fa-rotate-right me-2"></i>
        Actualizar
      </button>

      <button class="btn btn-primary rounded-3 px-3" (click)="crearPerfil()">
        <i class="fas fa-plus me-2"></i>
        Nuevo colaborador
      </button>
    </div>
  </header>

  <!-- TABLE CARD -->
  <article class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <!-- HEAD -->
        <thead class="table-light">
          <tr>
            <th class="erp-th ps-4">ID</th>

            <th class="erp-th">DNI</th>

            <th class="erp-th">Nombre</th>

            <th class="erp-th">Cargo</th>

            <th class="erp-th">Departamento</th>

            <th class="erp-th">Usuario</th>

            <th class="erp-th text-center pe-4">Acciones</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>
          <tr *ngFor="let p of perfiles">
            <td class="ps-4 text-muted">#{{ p.id }}</td>

            <td>
              <span class="fw-medium">
                {{ p.dni }}
              </span>
            </td>

            <td class="fw-medium text-dark">
              {{ p.nombre }}
            </td>

            <td class="text-muted">
              {{ p.cargo }}
            </td>

            <td class="text-muted">
              {{ p.departamento }}
            </td>

            <!-- STATUS -->
            <td>
              <span *ngIf="p.usuario; else sinUser" class="erp-badge erp-badge-success">
                Activo
              </span>

              <ng-template #sinUser>
                <span class="erp-badge erp-badge-secondary"> Sin usuario </span>
              </ng-template>
            </td>

            <!-- ACTIONS -->
            <td class="text-center pe-4">
              <div class="d-inline-flex gap-1">
                <!-- VER -->
                <button
                  class="btn btn-light btn-sm border rounded-3"
                  (click)="verDetalle(p.id)"
                  title="Ver detalle"
                >
                  <i class="fas fa-eye text-muted"></i>
                </button>

                <!-- EDITAR -->
                <button
                  class="btn btn-light btn-sm border rounded-3"
                  (click)="editar(p.id)"
                  title="Editar"
                >
                  <i class="fas fa-pen text-warning"></i>
                </button>

                <!-- ELIMINAR -->
                <button
                  class="btn btn-light btn-sm border rounded-3"
                  (click)="eliminar(p.id)"
                  title="Eliminar"
                >
                  <i class="fas fa-trash text-danger"></i>
                </button>

                <!-- CREAR USER -->
                <button
                  *ngIf="!p.usuario"
                  class="btn btn-light btn-sm border rounded-3"
                  (click)="crearUsuario(p)"
                  title="Crear usuario"
                >
                  <i class="fas fa-user-plus text-success"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </article>
</section>
