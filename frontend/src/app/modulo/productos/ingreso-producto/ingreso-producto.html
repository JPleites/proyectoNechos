<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">
  <header
    class="d-flex justify-content-between align-items-center mb-3 flex-shrink-0 modulo-header"
  >
    <div>
      <h4 class="mb-1 fw-semibold text-dark">Ingreso de Inventario</h4>
      <small class="text-muted">Registrar stock en ubicaciones físicas</small>
    </div>
  </header>

  <div class="modulo-contenido panel-scroll flex-grow-1 w-100">
    <article
      class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white h-100 d-flex flex-column"
    >
      <form
        class="card-body p-4 d-flex flex-column h-100 overflow-auto"
        [formGroup]="form"
        (ngSubmit)="$event.preventDefault(); ingresar()"
      >
        <div class="d-grid gap-3 flex-grow-1">
          <section class="erp-panel shadow-sm border">
            <h6 class="erp-section-title">
              <i class="fas fa-barcode me-1.5 text-primary"></i>Producto a Registrar
            </h6>

            <div class="row g-3 align-items-end">
              <div class="col-md-5 col-lg-4">
                <label class="form-label">Código del producto</label>
                <div class="input-group erp-input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted">
                    <i class="fas fa-tag"></i>
                  </span>
                  <input
                    formControlName="productoCodigo"
                    class="form-control border-start-0"
                    placeholder="Ej. PROD-001"
                    (keyup.enter)="$event.stopPropagation(); buscarProducto()"
                  />
                </div>
              </div>

              <div class="col-md-auto">
                <button
                  type="button"
                  class="btn btn-primary px-4 btn-buscar-erp"
                  (click)="$event.stopPropagation(); buscarProducto()"
                >
                  <i class="fas fa-search me-2 small"></i>
                  Buscar producto
                </button>
              </div>
            </div>
          </section>

          <section
            *ngIf="productoValido"
            class="erp-panel border border-success-subtle bg-white animated slideInUp"
          >
            <h6 class="erp-section-title text-success">
              <i class="fas fa-info-circle me-1.5"></i>Información de entrada e ingreso
            </h6>

            <div class="row g-3">
              <div class="col-md-6 col-lg-3">
                <label class="form-label"> Almacén de Destino </label>
                <select
                  formControlName="almacen"
                  class="form-select"
                  (change)="cargarUbicaciones()"
                >
                  <option value="">Seleccione almacén</option>
                  <option *ngFor="let a of almacenes" [value]="a.id">
                    {{ a.almacen }}
                  </option>
                </select>
              </div>

              <div class="col-md-6 col-lg-3">
                <label class="form-label"> Ubicación / Pasillo </label>
                <select formControlName="ubicacion" class="form-select">
                  <option value="">Seleccione ubicación</option>
                  <option *ngFor="let u of ubicaciones" [value]="u.ubicacion">
                    {{ u.ubicacion }} &nbsp;({{ u.estante }}-{{ u.nivel }}-{{ u.deposito }})
                  </option>
                </select>
              </div>

              <div class="col-md-6 col-lg-3">
                <label class="form-label"> Cantidad a Ingresar </label>
                <input
                  type="number"
                  formControlName="cantidad"
                  class="form-control"
                  placeholder="0"
                  min="1"
                />
              </div>

              <div class="col-md-6 col-lg-3">
                <label class="form-label"> Tipo de Movimiento </label>
                <select formControlName="referencia" class="form-select">
                  <option value="">Seleccione tipo</option>
                  <option value="compra">📦 Compra / Proveedor</option>
                  <option value="devolucion">🔄 Devolución de Cliente</option>
                  <option value="ajuste">⚙️ Ajuste de Inventario</option>
                </select>
              </div>
            </div>
          </section>

          <div
            *ngIf="!productoValido"
            class="text-center py-5 my-auto text-muted opacity-50 animated fadeIn"
          >
            <i class="fas fa-truck-loading fa-3x mb-3 text-secondary"></i>
            <p class="mb-0 small fw-medium">
              Ingrese un código válido arriba para activar los campos de stock.
            </p>
          </div>
        </div>

        <footer
          *ngIf="productoValido"
          class="d-flex justify-content-end mt-4 pt-3 border-top flex-shrink-0 animated fadeIn"
        >
          <button type="submit" class="btn btn-success rounded-3 px-4 fw-medium btn-ingresar-stock">
            <i class="fas fa-box me-2 small"></i>
            Confirmar e Ingresar Inventario
          </button>
        </footer>
      </form>
    </article>
  </div>
</div>
