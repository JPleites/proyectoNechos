<div class="container py-4">
  <div class="card">

    <!-- HEADER -->
    <div class="card-body">
      <h4 class="mb-0">Ingreso de Inventario</h4>
      <small class="text-muted">Registrar stock en ubicaciones</small>
    </div>

    <div class="card-body pt-0">
      <form [formGroup]="form" (ngSubmit)="ingresar()">

        <div class="row g-3">

          <!-- 🔎 BUSCAR PRODUCTO -->
          <div class="col-md-4">
            <div class="form-outline">
              <input formControlName="productoCodigo" class="form-control" />
              <label class="form-label">Código producto</label>
            </div>
            <button type="button" class="btn btn-primary mt-2" (click)="buscarProducto()">
              Buscar producto
            </button>
          </div>

          <!-- 🏬 ALMACÉN -->
          <div class="col-md-4">
            <div class="form-outline">
              <select formControlName="almacen" class="form-control" (change)="cargarUbicaciones()">
                <option value="">Seleccione almacén</option>
                <option *ngFor="let a of almacenes" [value]="a.id">
                  {{ a.almacen }}
                </option>
              </select>
              <label class="form-label">Almacén</label>
            </div>
          </div>

          <!-- 📦 UBICACIÓN -->
          <div class="col-md-4">
            <div class="form-outline">
              <select formControlName="ubicacion" class="form-control">
                <option value="">Seleccione ubicación</option>
                <option *ngFor="let u of ubicaciones" [value]="u.id">
                  {{ u.ubicacion }} ({{ u.estante }}-{{ u.nivel }}-{{ u.deposito }})
                </option>
              </select>
              <label class="form-label">Ubicación disponible</label>
            </div>
          </div>

          <!-- 🔢 CANTIDAD -->
          <div class="col-md-4">
            <div class="form-outline">
              <input type="number" formControlName="cantidad" class="form-control" />
              <label class="form-label">Cantidad</label>
            </div>
          </div>

        </div>

        <!-- BOTÓN -->
        <div class="text-end mt-4">
          <button type="submit" class="btn btn-success">
            <i class="fas fa-box me-2"></i>
            Ingresar inventario
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
