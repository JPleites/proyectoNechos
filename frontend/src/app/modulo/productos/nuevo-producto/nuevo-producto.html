<section class="container-fluid py-4 bg-body-tertiary min-vh-100">
  <article class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <!-- HEADER -->
    <header class="card-header bg-white border-bottom px-4 py-3">
      <h4 class="mb-1 fw-semibold">Nuevo Producto</h4>

      <small class="text-muted"> Registro de información del inventario </small>
    </header>

    <form class="card-body p-4" [formGroup]="form" (ngSubmit)="guardar()">
      <div class="row g-4">
        <!-- IMAGEN -->
        <!-- IMAGEN -->
        <aside class="col-lg-4">
          <section class="erp-card text-center p-3">
            <!-- PREVIEW -->
            <div class="d-flex justify-content-center mb-3">
              <img
                [src]="imagePreview || 'https://via.placeholder.com/220x220?text=Producto'"
                class="erp-product-image"
                alt="Producto"
              />
            </div>

            <!-- INPUT FILE -->
            <label class="btn btn-outline-primary w-100 mb-2">
              <i class="fas fa-upload me-2"></i>
              Seleccionar imagen
              <input type="file" accept="image/*" hidden (change)="onImageSelected($event)" />
            </label>

            <small class="erp-muted d-block"> Formatos recomendados: JPG, PNG </small>
          </section>
        </aside>

        <!-- FORMULARIO -->
        <main class="col-lg-8 d-grid gap-4">
          <!-- INFORMACIÓN -->
          <section class="erp-panel">
            <h6 class="erp-section-title">Información básica</h6>

            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label"> Código </label>

                <input formControlName="codigo" class="form-control" />
              </div>

              <div class="col-md-8">
                <label class="form-label"> Nombre del producto </label>

                <input formControlName="producto" class="form-control" />
              </div>
            </div>
          </section>

          <!-- PRECIOS -->
          <section class="erp-panel">
            <h6 class="erp-section-title">Precios</h6>

            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Costo compra</label>

                <input type="number" formControlName="costoCompra" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="form-label">Costo venta</label>

                <input type="number" formControlName="costoVenta" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="form-label">Precio venta</label>

                <input type="number" formControlName="precio" class="form-control" />
              </div>

              <div class="col-md-4">
                <label class="form-label">Descuento</label>

                <input type="number" formControlName="descuento" class="form-control" />
              </div>
            </div>
          </section>

          <!-- LOGÍSTICA -->
          <section class="erp-panel">
            <h6 class="erp-section-title">Logística</h6>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label"> Categoría </label>

                <select
                  formControlName="categoria"
                  class="form-select"
                  (change)="onCategoriaChange()"
                >
                  <option value="">Seleccione</option>

                  <option *ngFor="let c of categorias" [value]="c.id">
                    {{ c.nombre }}
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label"> Proveedor </label>

                <select
                  formControlName="proveedor"
                  class="form-select"
                  (change)="onProveedorChange()"
                >
                  <option value="">Seleccione</option>

                  <option *ngFor="let p of proveedoresFiltrados" [value]="p.id">
                    {{ p.proveedor }}
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label"> Marca </label>

                <select formControlName="marca" class="form-select">
                  <option value="">Seleccione</option>

                  <option *ngFor="let m of marcasFiltradas" [value]="m.id">
                    {{ m.nombre }}
                  </option>
                </select>
              </div>
            </div>
          </section>

          <!-- DESCRIPCIÓN -->
          <section class="erp-panel">
            <h6 class="erp-section-title">Descripción</h6>

            <textarea rows="4" formControlName="descripcion" class="form-control"></textarea>
          </section>

          <!-- ACTIONS -->
          <footer class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-light border rounded-3 px-4">Cancelar</button>

            <button type="submit" class="btn btn-primary rounded-3 px-4">
              <i class="fas fa-save me-2"></i>
              Guardar producto
            </button>
          </footer>
        </main>
      </div>
    </form>
  </article>
</section>
