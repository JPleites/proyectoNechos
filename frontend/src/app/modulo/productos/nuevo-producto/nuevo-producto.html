<div class="container py-4">
  <div class="erp-card">
    <!-- HEADER -->
    <div class="erp-header">
      <h4 class="erp-title">Nuevo Producto</h4>
      <p class="erp-subtitle">Registro de información del inventario</p>
    </div>

    <div class="row g-4">
      <!-- IMAGEN -->
      <div class="col-lg-4">
        <div class="erp-section text-center">
          <img
            [src]="imagePreview || 'https://via.placeholder.com/220x220?text=Producto'"
            class="erp-image mb-3"
          />

          <input
            type="file"
            class="form-control erp-input"
            (change)="onImageSelected($event)"
            accept="image/*"
          />

          <small class="text-muted d-block mt-2"> Imagen del producto </small>
        </div>
      </div>

      <!-- FORM -->
      <div class="col-lg-8">
        <form [formGroup]="form" (ngSubmit)="guardar()">
          <!-- SECCIÓN: BÁSICOS -->
          <div class="erp-section">
            <h6 class="erp-section-title">Información básica</h6>

            <div class="row g-3">
              <div class="col-md-4">
                <label class="erp-label">Código</label>
                <input formControlName="codigo" class="erp-input" />
              </div>

              <div class="col-md-8">
                <label class="erp-label">Nombre del producto</label>
                <input formControlName="producto" class="erp-input" />
              </div>
            </div>
          </div>

          <!-- SECCIÓN: PRECIOS -->
          <div class="erp-section">
            <h6 class="erp-section-title">Precios</h6>

            <div class="row g-3">
              <div class="col-md-4">
                <label class="erp-label">Costo de compra</label>
                <input type="number" formControlName="costoCompra" class="erp-input" />
              </div>

              <div class="col-md-4">
                <label class="erp-label">Costo de venta</label>
                <input type="number" formControlName="costoVenta" class="erp-input" />
              </div>

              <div class="col-md-4">
                <label class="erp-label">Precio de venta</label>
                <input type="number" formControlName="precio" class="erp-input" />
              </div>

              <div class="col-md-4">
                <label class="erp-label">Descuento</label>
                <input type="number" formControlName="descuento" class="erp-input" />
              </div>
            </div>
          </div>

          <!-- SECCIÓN: LOGÍSTICA -->
          <div class="erp-section">
            <h6 class="erp-section-title">Logística</h6>

            <div class="col-md-6">
              <label class="erp-label">Categoría *</label>
              <select formControlName="categoria" class="erp-input" (change)="onCategoriaChange()">
                <option value="">Seleccione</option>
                <option *ngFor="let c of categorias" [value]="c.id">
                  {{ c.nombre }}
                </option>
              </select>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="erp-label">Proveedor</label>
                <select formControlName="proveedor" class="erp-input">
                  <option value="">Seleccione</option>
                  <option *ngFor="let p of proveedoresFiltrados" [value]="p.id">
                    {{ p.proveedor }}
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="erp-label">Marca</label>
                <input formControlName="marca" class="erp-input" />
              </div>
            </div>
          </div>

          <!-- SECCIÓN: DESCRIPCIÓN -->
          <div class="erp-section">
            <h6 class="erp-section-title">Descripción</h6>

            <textarea formControlName="descripcion" rows="3" class="erp-input"></textarea>
          </div>

          <!-- BOTÓN -->
          <div class="text-end mt-3">
            <button type="submit" class="erp-btn">
              <i class="fas fa-save me-2"></i>
              Guardar producto
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
