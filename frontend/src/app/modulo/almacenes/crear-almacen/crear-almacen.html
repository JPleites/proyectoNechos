<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">

  <header class="modulo-header mb-3">
    <h4 class="mb-1 fw-semibold">Nuevo almacén</h4>
    <small class="text-muted">Registro de bodegas</small>
  </header>

  <div class="modulo-contenido d-flex justify-content-center align-items-start pt-2">
    <article class="card border-0 shadow-sm rounded-4 overflow-hidden w-100 form-container">
      
      <form class="card-body p-4">
        <div class="d-grid gap-4">
          
          <section class="erp-panel">
            <label class="form-label fw-medium text-secondary mb-2">Nombre del almacén *</label>
            <input 
              [(ngModel)]="almacen.almacen" 
              name="almacen" 
              class="form-control rounded-3 border-secondary-subtle py-2" 
              placeholder="Ej. Bodega Central"
            />
          </section>

          <footer class="d-flex justify-content-end gap-2 pt-2">
            <button 
              type="button" 
              class="btn btn-light border rounded-3 px-4 btn-accion-secundario"
            >
              Cancelar
            </button>

            <button 
              type="button" 
              class="btn btn-primary rounded-3 px-4 btn-accion-primario" 
              (click)="guardar()"
            >
              <i class="fas fa-save me-2"></i>
              Guardar
            </button>
          </footer>

        </div>
      </form>

    </article>
  </div>

</div>
