<div class="erp-page">
  <div class="erp-card d-flex flex-column h-100">
    <!-- HEADER -->
    <header class="erp-card-header">
      <h4 class="erp-title d-flex align-items-center gap-2">
        <i class="fas fa-cash-register text-primary"></i>
        Cierre de Caja
      </h4>
      <p class="erp-subtitle">Control de arqueo diario</p>
    </header>

    <!-- CONTENIDO -->
    <div class="erp-section flex-grow-1 overflow-auto">
      <!-- RESUMEN -->
      <div *ngIf="arqueo" class="row g-3 mb-4">
        <div
          class="col-6 col-md-4 col-lg-2"
          *ngFor="
            let item of [
              { label: 'Efectivo', value: arqueo.totalEfectivo },
              { label: 'BAC', value: arqueo.totalBac },
              { label: 'Ficohsa', value: arqueo.totalFicohsa },
              { label: 'Davivienda', value: arqueo.totalDavivienda },
              { label: 'Transferencias', value: arqueo.totalTransferencias },
              { label: 'Total', value: arqueo.totalFacturado },
            ]
          "
        >
          <div class="erp-card-soft text-center p-3">
            <div class="erp-muted small">{{ item.label }}</div>
            <div class="fw-bold">L {{ item.value }}</div>
          </div>
        </div>
      </div>

      <hr />

      <!-- INPUTS -->
      <h6 class="erp-section-title">Recuento físico</h6>

      <div class="row g-3">
        <div class="col-6 col-md-4 col-lg-2">
          <label class="erp-label">Efectivo</label>
          <input
            class="erp-input form-control"
            type="number"
            [(ngModel)]="efectivoContado"
            (input)="calcularDiferencia()"
          />
        </div>

        <div class="col-6 col-md-4 col-lg-2">
          <label class="erp-label">BAC</label>
          <input
            class="erp-input form-control"
            type="number"
            [(ngModel)]="bacContado"
            (input)="calcularDiferencia()"
          />
        </div>

        <div class="col-6 col-md-4 col-lg-2">
          <label class="erp-label">Ficohsa</label>
          <input
            class="erp-input form-control"
            type="number"
            [(ngModel)]="ficohsaContado"
            (input)="calcularDiferencia()"
          />
        </div>

        <div class="col-6 col-md-4 col-lg-2">
          <label class="erp-label">Davivienda</label>
          <input
            class="erp-input form-control"
            type="number"
            [(ngModel)]="daviviendaContado"
            (input)="calcularDiferencia()"
          />
        </div>

        <div class="col-6 col-md-4 col-lg-2">
          <label class="erp-label">Transferencias</label>
          <input
            class="erp-input form-control"
            type="number"
            [(ngModel)]="transferenciaContado"
            (input)="calcularDiferencia()"
          />
        </div>
      </div>

      <!-- DIFERENCIAS -->
      <div class="mt-4">
        <h6 class="erp-section-title">Desglose de diferencias</h6>

        <div class="list-group">
          <div
            class="list-group-item d-flex justify-content-between"
            *ngFor="
              let d of [
                { label: 'Efectivo', value: diferencias.efectivo },
                { label: 'BAC', value: diferencias.bac },
                { label: 'Ficohsa', value: diferencias.ficohsa },
                { label: 'Davivienda', value: diferencias.davivienda },
                { label: 'Transferencias', value: diferencias.transferencia },
              ]
            "
          >
            <span>{{ d.label }}</span>
            <span [ngClass]="d.value >= 0 ? 'text-success fw-semibold' : 'text-danger fw-semibold'">
              L {{ d.value }}
            </span>
          </div>

          <div class="list-group-item d-flex justify-content-between fw-bold bg-light">
            <span>Total</span>
            <span [ngClass]="diferencias.total >= 0 ? 'text-success' : 'text-danger'">
              L {{ diferencias.total }}
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="card-footer bg-white text-end border-0">
      <button class="btn btn-danger btn-lg" (click)="cerrarCaja()">
        <i class="fas fa-lock me-2"></i>
        Cerrar caja
      </button>
    </footer>
  </div>
</div>
