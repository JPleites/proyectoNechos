<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">

  <header class="modulo-header mb-3">
    <h4 class="mb-1 fw-semibold">Nueva Categoría</h4>
    <small class="text-muted">Registro de categorías de productos</small>
  </header>

  <div class="modulo-contenido d-flex justify-content-center align-items-start pt-2 panel-scroll">
    <article class="card border-0 shadow-sm rounded-4 overflow-hidden w-100 container-formulario">
      
      <form class="card-body p-4">
        <div class="d-grid gap-4">
          
          <section class="erp-panel">
            <label class="form-label fw-semibold text-secondary small text-uppercase letter-spacing mb-2">
              Nombre de la Categoría <span class="text-danger">*</span>
            </label>
            <div class="input-group-custom">
              <input 
                [(ngModel)]="categoria.nombre" 
                name="nombre" 
                class="form-control form-control-lg rounded-3 fs-6" 
                placeholder="Ej. Aceite, Bandas, Refacciones, etc."
                required
              />
            </div>
          </section>

          <footer class="d-flex justify-content-end gap-2 pt-2 border-top border-light-subtle">
            <button 
              type="button" 
              class="btn btn-light border rounded-3 px-4 fw-medium btn-accion"
            >
              Cancelar
            </button>

            <button 
              type="button" 
              class="btn btn-primary rounded-3 px-4 fw-medium btn-accion-primario" 
              (click)="guardar()"
            >
              <i class="fas fa-tags me-2 small"></i>
              Guardar categoría
            </button>
          </footer>

        </div>
      </form>

    </article>
  </div>

</div>
