<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">
  <header class="modulo-header d-flex justify-content-between align-items-center mb-3">
    <div>
      <h4 class="mb-1 fw-semibold">Nueva Subcategoría</h4>
      <small class="text-muted">Asociar una subcategoría a una categoría existente</small>
    </div>
    <a routerLink="/categorias/consulta" class="btn btn-light border rounded-3 px-3">
      <i class="fas fa-arrow-left me-2"></i>Volver
    </a>
  </header>

  <div class="modulo-contenido">
    <article class="card border-0 shadow-sm rounded-4 bg-white">
      <div class="card-body p-4" style="max-width: 500px">
        <form [formGroup]="form" (ngSubmit)="guardar()">
          <div class="mb-3">
            <label class="form-label fw-medium">Categoría</label>
            <select formControlName="categoriaId" class="form-select">
              <option value="">Seleccione una categoría</option>
              <option *ngFor="let c of categorias" [value]="c.id">
                {{ c.nombre }}
              </option>
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label fw-medium">Nombre de la subcategoría</label>
            <input
              formControlName="nombre"
              class="form-control"
              placeholder="Ej. Aceites de motor, Filtros de aire..."
            />
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4" [disabled]="guardando">
              <span *ngIf="!guardando"> <i class="fas fa-save me-2"></i>Guardar </span>
              <span *ngIf="guardando">
                <span class="spinner-border spinner-border-sm me-2"></span>Guardando...
              </span>
            </button>
            <a routerLink="/categorias/consulta" class="btn btn-light border px-4">Cancelar</a>
          </div>
        </form>
      </div>
    </article>
  </div>
</div>
