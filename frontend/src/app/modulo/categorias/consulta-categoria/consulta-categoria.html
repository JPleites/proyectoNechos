<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">

  <header class="modulo-header d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-3">
    <div>
      <h4 class="mb-1 fw-semibold">Categorías</h4>
      <small class="text-muted">Gestión de categorías</small>
    </div>

    <a routerLink="/categorias/crear" class="btn btn-primary rounded-3 px-3 shadow-sm btn-nuevo">
      <i class="fas fa-plus me-2"></i>
      Nueva categoría
    </a>
  </header>

  <div class="modulo-contenido">
    <article class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">

          <thead class="table-light">
            <tr>
              <th class="erp-th ps-4 col-id">ID</th>
              <th class="erp-th">Nombre</th>
              <th class="erp-th text-center pe-4 col-acciones">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let c of categorias">
              <td class="ps-4 fw-semibold text-muted">#{{ c.categoriaID }}</td>
              <td class="fw-medium text-dark">
                <i class="fas fa-tag text-muted me-2 small"></i>
                {{ c.nombre }}
              </td>
              <td class="text-center pe-4">
                <button
                  class="btn btn-light btn-sm border rounded-3 btn-accion"
                  (click)="eliminar(c.id)"
                  title="Eliminar"
                >
                  <i class="fas fa-trash text-danger"></i>
                </button>
              </td>
            </tr>

            <tr *ngIf="!categorias || categorias.length === 0">
              <td colspan="3" class="text-center py-5 text-muted bg-white">
                <i class="fas fa-inbox fa-2x d-block mb-2 opacity-50"></i>
                <div class="small fw-medium">No hay categorías registradas</div>
              </td>
            </tr>
          </tbody>

        </table>
      </div>
    </article>
  </div>

</div>
