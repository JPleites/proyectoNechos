<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">
  <header class="modulo-header d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-3">
    <div>
      <h4 class="mb-1 fw-semibold">Categorías</h4>
      <small class="text-muted">Gestión de categorías y subcategorías</small>
    </div>
    <div class="d-flex gap-2 w-100 w-sm-auto justify-content-sm-end">
      <a routerLink="/categorias/crear-subcategoria" class="btn btn-outline-primary rounded-3 px-3 shadow-sm flex-grow-1 flex-sm-grow-0 text-center">
        <i class="fas fa-sitemap me-2"></i>Nueva subcategoría
      </a>
      <a routerLink="/categorias/crear" class="btn btn-primary rounded-3 px-3 shadow-sm btn-nuevo flex-grow-1 flex-sm-grow-0 text-center">
        <i class="fas fa-plus me-2"></i>Nueva categoría
      </a>
    </div>
  </header>

  <!-- BUSCADOR -->
  <div class="mb-3">
    <div class="input-group" style="max-width: 350px">
      <span class="input-group-text bg-white border-end-0">
        <i class="fas fa-search text-muted small"></i>
      </span>
      <input
        type="text"
        class="form-control border-start-0"
        placeholder="Buscar categoría o subcategoría..."
        [(ngModel)]="busqueda"
      />
      <button *ngIf="busqueda" class="btn btn-light border border-start-0" (click)="busqueda = ''">
        <i class="fas fa-times text-muted small"></i>
      </button>
    </div>
  </div>

  <div class="modulo-contenido">
    <article class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 d-flex flex-column">
      <div class="table-responsive flex-grow-1" style="overflow-y: auto;">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light sticky-top bg-white"> <tr>
              <th class="erp-th ps-4">ID</th>
              <th class="erp-th">Nombre</th>
              <th class="erp-th">Subcategorías</th>
              <th class="erp-th text-center pe-4">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <ng-container *ngFor="let c of categoriasFiltradas">
              <tr>
                <td class="ps-4 fw-semibold text-muted">{{ c.categoriaID }}</td>
                <td class="fw-medium text-dark">
                  <i class="fas fa-tag text-muted me-2 small"></i>
                  {{ c.nombre }}
                </td>
                <td>
                  <span *ngIf="!c.subCategorias || c.subCategorias.length === 0" class="text-muted small fst-italic">
                    Sin subcategorías
                  </span>
                  <div *ngIf="c.subCategorias?.length > 0" class="d-flex flex-wrap gap-1">
                    <span *ngFor="let s of c.subCategorias" class="badge bg-light text-dark border d-flex align-items-center gap-1">
                      {{ s.nombre }}
                      <button type="button" class="btn-close btn-close-sm" style="font-size: 0.5rem" title="Eliminar subcategoría" (click)="eliminarSubCategoria(s.id, c.id)"></button>
                    </span>
                  </div>
                </td>
                <td class="text-center pe-4">
                  <button class="btn btn-light btn-sm border rounded-3 btn-accion" (click)="eliminar(c.id)" title="Eliminar categoría">
                    <i class="fas fa-trash text-danger"></i>
                  </button>
                </td>
              </tr>
            </ng-container>
            <tr *ngIf="categoriasFiltradas.length === 0">
              <td colspan="4" class="text-center py-5 text-muted bg-white">
                <i class="fas fa-inbox fa-2x d-block mb-2 opacity-50"></i>
                <div class="small fw-medium">No hay categorías registradas</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </article>
  </div>
</div>
