<section class="container-fluid py-4 bg-body-tertiary min-vh-100">
  <!-- HEADER -->
  <header class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-1 fw-semibold">Categorías</h4>

      <small class="text-muted"> Gestión de categorías </small>
    </div>

    <a routerLink="/categorias/crear" class="btn btn-primary rounded-3 px-3">
      <i class="fas fa-plus me-2"></i>
      Nueva categoría
    </a>
  </header>

  <!-- TABLE -->
  <article class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <!-- HEAD -->
        <thead class="table-light">
          <tr>
            <th class="erp-th ps-4" style="width: 150px">ID</th>

            <th class="erp-th">Nombre</th>

            <th class="erp-th text-center pe-4" style="width: 140px">Acciones</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>
          <tr *ngFor="let c of categorias">
            <td class="ps-4 fw-semibold text-muted">#{{ c.categoriaID }}</td>

            <td class="fw-medium text-dark">
              <i class="fas fa-tag text-muted me-2"></i>
              {{ c.nombre }}
            </td>

            <td class="text-center pe-4">
              <button
                class="btn btn-light btn-sm border rounded-3"
                (click)="eliminar(c.id)"
                title="Eliminar"
              >
                <i class="fas fa-trash text-danger"></i>
              </button>
            </td>
          </tr>

          <!-- EMPTY -->
          <tr *ngIf="!categorias || categorias.length === 0">
            <td colspan="3" class="text-center py-5 text-muted">
              <i class="fas fa-inbox fa-lg d-block mb-2"></i>

              No hay categorías registradas
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </article>
</section>
