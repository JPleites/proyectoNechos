<div class="container-fluid py-4">

  <div class="card">

    <!-- HEADER -->
    <div class="card-body d-flex justify-content-between align-items-center">
      <div>
        <h4 class="mb-0">Categorías</h4>
        <small class="text-muted">Gestión de categorías</small>
      </div>

      <a routerLink="/categorias/crear" class="btn btn-primary">
        <i class="fas fa-plus me-2"></i>
        Nueva
      </a>
    </div>

    <div class="card-body pt-0">

      <!-- TABLE -->
      <div class="table-responsive">

        <table class="table table-hover align-middle w-100">

          <thead class="table-light">
            <tr>
              <th style="width: 150px;">ID</th>
              <th>Nombre</th>
              <th class="text-center" style="width: 140px;">Acciones</th>
            </tr>
          </thead>

          <tbody>

            <tr *ngFor="let c of categorias">

              <td class="fw-semibold">{{ c.id }}</td>

              <td>
                <i class="fas fa-tag text-muted me-2"></i>
                {{ c.nombre }}
              </td>

              <td class="text-center">

                <button
                  class="btn btn-sm btn-outline-danger"
                  (click)="eliminar(c.id)"
                  title="Eliminar"
                >
                  <i class="fas fa-trash"></i>
                </button>

              </td>

            </tr>

            <!-- EMPTY STATE -->
            <tr *ngIf="!categorias || categorias.length === 0">
              <td colspan="3" class="text-center text-muted py-4">
                <i class="fas fa-inbox me-2"></i>
                No hay categorías registradas
              </td>
            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>
