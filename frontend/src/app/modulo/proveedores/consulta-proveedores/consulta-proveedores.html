<div class="container-fluid py-4">
  <div class="card">
    <!-- HEADER -->
    <div class="card-body d-flex justify-content-between align-items-center">
      <div>
        <h4 class="mb-0">Proveedores</h4>
        <small class="text-muted">Gestión de proveedores</small>
      </div>

      <a routerLink="/proveedores/nuevo" class="btn btn-primary">
        <i class="fas fa-plus me-2"></i>
        Nuevo
      </a>
    </div>

    <div class="card-body pt-0">
      <!-- TABLE -->
      <div class="table-responsive">
        <table class="table table-hover align-middle w-100">
          <thead class="table-light">
            <tr>
              <th style="width: 180px">RTN</th>
              <th>Nombre</th>
              <th class="text-center" style="width: 140px">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let p of proveedores">
              <td class="fw-semibold">{{ p.rtn }}</td>

              <td>
                <i class="fas fa-truck text-muted me-2"></i>
                {{ p.proveedor }}
              </td>

              <td class="text-center">
                <button
                  class="btn btn-sm btn-outline-primary me-2"
                  (click)="abrirCategorias(p)"
                  title="Asignar categorías"
                >
                  <i class="fas fa-tags"></i>
                </button>
              </td>
            </tr>

            <!-- EMPTY STATE -->
            <tr *ngIf="!proveedores || proveedores.length === 0">
              <td colspan="3" class="text-center text-muted py-4">
                <i class="fas fa-inbox me-2"></i>
                No hay proveedores registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop" *ngIf="mostrarModal">
  <div class="modal-container">
    <h5 class="mb-3">Asignar categorías a {{ proveedorSeleccionado?.proveedor }}</h5>

    <div *ngFor="let c of categorias" class="mb-2">
      <label>
        <input
          type="checkbox"
          [checked]="categoriasSeleccionadas.includes(c.id)"
          (change)="toggleCategoria(c.id, $event.target.checked)"
        />
        {{ c.nombre }}
      </label>
    </div>

    <div class="mt-3 text-end">
      <button class="btn btn-secondary me-2" (click)="cerrarModal()">Cancelar</button>

      <button class="btn btn-primary" (click)="guardarCategorias()">Guardar</button>
    </div>
  </div>
</div>
