<div class="container-fluid py-4">
  <div class="card">
    <!-- HEADER -->
    <div class="card-body d-flex justify-content-between align-items-center border-bottom">
      <div>
        <h4 class="mb-0">Proveedores</h4>
        <small class="text-muted">Gestión de proveedores</small>
      </div>

      <a routerLink="/proveedores/nuevo" class="btn btn-primary">
        <i class="fas fa-plus me-2"></i>
        Nuevo proveedor
      </a>
    </div>

    <!-- TABLE -->
    <div class="card-body pt-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle w-100">
          <thead class="table-light">
            <tr>
              <th style="width: 180px">RTN / Código</th>
              <th>Nombre</th>
              <th class="text-center" style="width: 140px">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let p of proveedores">
              <td class="fw-semibold">
                {{ p.rtn || p.id }}
              </td>

              <td>
                <i class="fas fa-truck text-muted me-2"></i>
                {{ p.proveedor }}
              </td>

              <td class="text-center">
                <button
                  class="btn btn-sm btn-outline-primary"
                  (click)="abrirCategorias(p)"
                  title="Asignar categorías"
                >
                  <i class="fas fa-tags"></i>
                </button>
              </td>
            </tr>

            <!-- EMPTY STATE -->
            <tr *ngIf="!proveedores || proveedores.length === 0">
              <td colspan="3" class="text-center text-muted py-4">
                <i class="fas fa-inbox me-2"></i>
                No hay proveedores registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop" *ngIf="mostrarModal">
  <div class="modal-container bg-white p-4 rounded shadow">
    <h5 class="mb-3">
      <i class="fas fa-tags me-2 text-primary"></i>
      Asignar categorías
    </h5>

    <p class="text-muted mb-3">
      {{ proveedorSeleccionado?.proveedor }}
    </p>

    <div class="mb-3">
      <div *ngFor="let c of categorias" class="form-check mb-2">
        <input
          class="form-check-input"
          type="checkbox"
          [checked]="categoriasSeleccionadas.includes(c.id)"
          (change)="toggleCategoria(c.id, $event.target.checked)"
        />

        <label class="form-check-label">
          {{ c.nombre }}
        </label>
      </div>
    </div>

    <div class="text-end">
      <button class="btn btn-secondary me-2" (click)="cerrarModal()">Cancelar</button>

      <button class="btn btn-primary" (click)="guardarCategorias()">Guardar</button>
    </div>
  </div>
</div>
