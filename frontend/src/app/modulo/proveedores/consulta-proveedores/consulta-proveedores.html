<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">
  <header
    class="d-flex justify-content-between align-items-center mb-3 flex-shrink-0 modulo-header"
  >
    <div>
      <h4 class="mb-1 fw-semibold text-dark">Proveedores</h4>
      <small class="text-muted">Gestión de comercios y asignación de categorías fiscales</small>
    </div>

    <a
      routerLink="/proveedores/crear"
      class="btn btn-primary rounded-3 px-3 btn-nuevo d-flex align-items-center"
    >
      <i class="fas fa-plus me-2 small"></i>
      Nuevo proveedor
    </a>
  </header>

  <div class="modulo-contenido panel-scroll flex-grow-1 w-100">
    <article
      class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white h-100 d-flex flex-column"
    >
      <main class="table-responsive flex-grow-1 h-100 overflow-auto">
        <table class="table table-hover align-middle mb-0 erp-table">
          <thead class="table-light sticky-top z-index-1">
            <tr>
              <th class="erp-th ps-4" style="width: 220px">RTN / Código</th>
              <th class="erp-th">Nombre de la Empresa</th>
              <th class="erp-th text-center pe-4" style="width: 140px">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr
              *ngFor="let p of proveedores"
              [class.row-selected]="proveedorSeleccionado?.id === p.id && mostrarModal"
            >
              <td class="ps-4 fw-semibold text-secondary letter-spacing-sm">
                {{ p.rtn || p.id }}
              </td>

              <td class="fw-medium text-dark">
                <div class="d-flex align-items-center">
                  <div
                    class="avatar-icon bg-light text-muted rounded-2 me-2.5 d-flex align-items-center justify-content-center"
                  >
                    <i class="fas fa-truck small"></i>
                  </div>
                  <span>{{ p.proveedor }}</span>
                </div>
              </td>

              <td class="text-center pe-4">
                <button
                  type="button"
                  class="btn btn-light btn-sm border rounded-3 btn-accion"
                  (click)="$event.stopPropagation(); abrirCategorias(p)"
                  title="Asignar categorías"
                >
                  <i class="fas fa-tags text-primary me-1.5 small"></i>
                  <span class="small fw-medium text-secondary">Categorías</span>
                </button>
              </td>
            </tr>

            <tr *ngIf="!proveedores || proveedores.length === 0">
              <td colspan="3" class="text-center py-5 text-muted small animated fadeIn">
                <i class="fas fa-inbox fa-2x mb-3 d-block opacity-50 text-secondary"></i>
                No hay proveedores registrados en el sistema.
              </td>
            </tr>
          </tbody>
        </table>
      </main>
    </article>
  </div>

  <div *ngIf="mostrarModal" class="erp-modal-backdrop animated fadeIn" (click)="cerrarModal()">
    <div
      class="erp-modal shadow-lg rounded-4 border bg-white animated scaleIn"
      (click)="$event.stopPropagation()"
    >
      <header class="modal-header-erp pb-2 mb-3 border-bottom">
        <h5 class="mb-1 fw-semibold text-dark d-flex align-items-center">
          <i class="fas fa-tags me-2 text-primary"></i>
          Asignar Categorías
        </h5>
        <small class="text-muted fw-medium">
          <i class="fas fa-building me-1"></i>{{ proveedorSeleccionado?.proveedor }}
        </small>
      </header>

      <main class="modal-body-erp panel-scroll mb-4" style="max-height: 280px">
        <div class="d-grid gap-2 pe-1">
          <label
            *ngFor="let c of categorias"
            class="d-flex align-items-center gap-2.5 p-2.5 border rounded-3 cursor-pointer item-checkbox-label"
            [class.label-checked]="categoriasSeleccionadas.includes(c.id)"
          >
            <input
              type="checkbox"
              class="form-check-input erp-checkbox m-0"
              [checked]="categoriasSeleccionadas.includes(c.id)"
              (change)="toggleCategoria(c.id, $event.target.checked)"
            />
            <span class="fw-medium text-dark small">{{ c.nombre }}</span>
          </label>
        </div>
      </main>

      <footer class="d-flex justify-content-end gap-2 pt-2 border-top">
        <button
          type="button"
          class="btn btn-light border rounded-3 px-3.5 btn-sm fw-medium"
          (click)="cerrarModal()"
        >
          Cancelar
        </button>

        <button
          type="button"
          class="btn btn-primary rounded-3 px-4 btn-sm fw-medium"
          (click)="guardarCategorias()"
        >
          <i class="fas fa-save me-1.5 small"></i>Guardar Cambios
        </button>
      </footer>
    </div>
  </div>
</div>
