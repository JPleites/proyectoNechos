<section class="container-fluid py-4 bg-body-tertiary min-vh-100">
  <article class="card border-0 shadow-sm rounded-4 overflow-hidden mx-auto" style="max-width: 600px">

    <!-- HEADER -->
    <header class="card-header bg-white border-bottom px-4 py-3">
      <h4 class="mb-1 fw-semibold">Nuevo proveedor</h4>
      <small class="text-muted">Registro de proveedores</small>
    </header>

    <!-- FORM -->
    <form class="card-body p-4" [formGroup]="form" (ngSubmit)="guardar()">
      <div class="d-grid gap-4">

        <!-- RTN -->
        <section class="erp-panel">
          <label class="form-label">RTN *</label>
          <input formControlName="rtn" class="form-control" />
        </section>

        <!-- NOMBRE -->
        <section class="erp-panel">
          <label class="form-label">Nombre del proveedor *</label>
          <input formControlName="proveedor" class="form-control" />
        </section>

        <!-- ACTIONS -->
        <footer class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-light border rounded-3 px-4">
            Cancelar
          </button>

          <button type="submit" class="btn btn-primary rounded-3 px-4">
            <i class="fas fa-truck me-2"></i>
            Guardar proveedor
          </button>
        </footer>

      </div>
    </form>

  </article>
</section>
