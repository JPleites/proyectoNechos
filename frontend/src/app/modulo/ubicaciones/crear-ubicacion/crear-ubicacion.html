<section class="container-fluid py-4 bg-body-tertiary min-vh-100">
  <article
    class="card border-0 shadow-sm rounded-4 overflow-hidden mx-auto"
    style="max-width: 700px"
  >
    <!-- HEADER -->
    <header class="card-header bg-white border-bottom px-4 py-3">
      <h4 class="mb-1 fw-semibold">Nueva ubicación</h4>

      <small class="text-muted"> Registro de estantes y niveles </small>
    </header>

    <!-- FORM -->
    <form class="card-body p-4">
      <div class="d-grid gap-4">
        <!-- ALMACÉN -->
        <section class="erp-panel">
          <label class="form-label"> Almacén </label>

          <select class="form-select" [(ngModel)]="ubicacion.almacenId" name="almacenId">
            <option value="">Seleccione almacén</option>

            <option *ngFor="let a of almacenes" [value]="a.id">
              {{ a.almacen }}
            </option>
          </select>
        </section>

        <!-- GRID -->
        <section class="erp-panel">
          <h6 class="erp-section-title">Detalle de ubicación</h6>

          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label"> Estante </label>

              <input [(ngModel)]="ubicacion.estante" name="estante" class="form-control" />
            </div>

            <div class="col-md-4">
              <label class="form-label"> Nivel </label>

              <input [(ngModel)]="ubicacion.nivel" name="nivel" class="form-control" />
            </div>

            <div class="col-md-4">
              <label class="form-label"> Depósito </label>

              <input [(ngModel)]="ubicacion.deposito" name="deposito" class="form-control" />
            </div>
          </div>
        </section>

        <!-- PREVIEW -->
        <section class="erp-panel">
          <h6 class="erp-section-title">Código generado</h6>

          <div class="erp-code-preview">
            A{{ ubicacion.almacenId }} E{{ ubicacion.estante }} N{{ ubicacion.nivel }} D{{
              ubicacion.deposito
            }}
          </div>
        </section>

        <!-- ACTIONS -->
        <footer class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-light border rounded-3 px-4">Cancelar</button>

          <button type="button" class="btn btn-primary rounded-3 px-4" (click)="guardar()">
            <i class="fas fa-map-marker-alt me-2"></i>
            Guardar ubicación
          </button>
        </footer>
      </div>
    </form>
  </article>
</section>
