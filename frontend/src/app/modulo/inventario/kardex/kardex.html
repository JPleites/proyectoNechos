<section class="container-fluid py-4 bg-body-tertiary min-vh-100">
  <!-- HEADER -->
  <header class="mb-4">
    <h4 class="mb-1 fw-semibold">Kardex de inventario</h4>

    <small class="text-muted"> Historial de movimientos de productos </small>
  </header>

  <!-- CARD -->
  <article class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="card-body">
      <!-- SEARCH -->
      <form (ngSubmit)="buscar()" class="mb-4">
        <div class="input-group">
          <input
            name="codigo"
            [(ngModel)]="codigo"
            class="form-control"
            placeholder="Código de producto"
          />

          <button type="submit" class="btn btn-primary px-4">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </form>

      <!-- TABLE -->
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <!-- HEADER -->
          <thead class="table-light">
            <tr>
              <th class="erp-th">Fecha</th>

              <th class="erp-th">Tipo</th>

              <th class="erp-th">Cantidad</th>

              <th class="erp-th">Usuario</th>

              <th class="erp-th">Stock</th>
            </tr>
          </thead>

          <!-- BODY -->
          <tbody>
            <tr *ngFor="let m of movimientos">
              <td class="text-muted">
                {{ m.fecha | date: 'short' }}
              </td>

              <!-- TIPO -->
              <td>
                <span
                  class="erp-badge"
                  [ngClass]="{
                    'erp-badge-success': m.tipo === 'ENTRADA',
                    'erp-badge-danger': m.tipo === 'SALIDA',
                  }"
                >
                  {{ m.tipo }}
                </span>
              </td>

              <td class="fw-semibold">
                {{ m.cantidad }}
              </td>

              <td class="text-muted">
                <i class="fas fa-user me-1"></i>
                {{ m.codigoUsuario }}
              </td>

              <td class="fw-semibold">
                {{ m.saldo }}
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </article>
</section>
