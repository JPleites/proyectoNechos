<div class="container-fluid vh-100 d-flex flex-column p-3 bg-light page-wrapper">
  
  <!-- HEADER DEL MÓDULO (Estructura adaptada a tu maestro) -->
  <header class="d-flex justify-content-between align-items-center mb-3 flex-shrink-0">
    <div>
      <h4 class="mb-1 fw-semibold text-dark">Clientes</h4>
      <small class="text-muted">Gestión de clientes</small>
    </div>

    <a routerLink="/clientes/nuevo" class="btn btn-primary rounded-3 px-3 btn-accion-primario">
      <i class="fas fa-user-plus me-2 small"></i>
      Nuevo cliente
    </a>
  </header>

  <!-- CONTENIDO CON SCROLL INTELIGENTE -->
  <div class="modulo-contenido panel-scroll flex-grow-1">
    <article class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white h-100">
      <div class="table-responsive h-100">
        <table class="table table-hover align-middle mb-0 erp-table-clientes">
          
          <!-- HEADER DE LA TABLA -->
          <thead class="table-light">
            <tr>
              <th class="erp-th ps-4" style="width: 120px">ID</th>
              <th class="erp-th">Nombre</th>
              <th class="erp-th">Correo</th>
              <th class="erp-th">Teléfono</th>
              <th class="erp-th">Dirección</th>
              <th class="erp-th text-center pe-4" style="width: 140px">Acciones</th>
            </tr>
          </thead>

          <!-- BODY DE LA TABLA -->
          <tbody>
            <tr *ngFor="let c of clientes">
              <td class="ps-4 fw-semibold text-muted">#{{ c.id }}</td>

              <td class="fw-medium text-dark text-nowrap">
                <i class="fas fa-user text-muted opacity-75 me-2 small"></i>
                {{ c.nombre }}
              </td>

              <td class="text-muted text-nowrap">
                {{ c.correo }}
              </td>

              <td class="text-muted text-nowrap">
                <i class="fas fa-phone text-muted opacity-75 me-2 small"></i>
                {{ c.telefono || '-' }}
              </td>

              <td class="text-muted text-truncate erp-truncate">
                {{ c.direccion || '-' }}
              </td>

              <!-- ACTIONS -->
              <td class="text-center pe-4">
                <button
                  class="btn btn-light btn-sm border rounded-3 btn-eliminar-tabla"
                  (click)="eliminar(c.id)"
                  title="Eliminar"
                >
                  <i class="fas fa-trash text-danger small"></i>
                </button>
              </td>
            </tr>

            <!-- EMPTY STATE -->
            <tr *ngIf="!clientes || clientes.length === 0">
              <td colspan="6" class="text-center py-5 text-muted row-vacia">
                <i class="fas fa-inbox fa-2x mb-3 d-block text-secondary opacity-50"></i>
                <span class="fw-medium">No hay clientes registrados</span>
              </td>
            </tr>
          </tbody>

        </table>
      </div>
    </article>
  </div>

</div>
