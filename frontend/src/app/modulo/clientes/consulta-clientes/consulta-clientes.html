<section class="container-fluid py-4 bg-body-tertiary min-vh-100">
  <!-- HEADER -->
  <header class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-1 fw-semibold">Clientes</h4>

      <small class="text-muted"> Gestión de clientes </small>
    </div>

    <a routerLink="/clientes/nuevo" class="btn btn-primary rounded-3 px-3">
      <i class="fas fa-user-plus me-2"></i>
      Nuevo cliente
    </a>
  </header>

  <!-- TABLE -->
  <article class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <!-- HEADER -->
        <thead class="table-light">
          <tr>
            <th class="erp-th ps-4" style="width: 120px">ID</th>

            <th class="erp-th">Nombre</th>

            <th class="erp-th">Correo</th>

            <th class="erp-th">Teléfono</th>

            <th class="erp-th">Dirección</th>

            <th class="erp-th text-center pe-4" style="width: 140px">Acciones</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>
          <tr *ngFor="let c of clientes">
            <td class="ps-4 fw-semibold text-muted">#{{ c.id }}</td>

            <td class="fw-medium text-dark">
              <i class="fas fa-user text-muted me-2"></i>
              {{ c.nombre }}
            </td>

            <td class="text-muted">
              {{ c.correo }}
            </td>

            <td class="text-muted">
              <i class="fas fa-phone text-muted me-2"></i>
              {{ c.telefono || '-' }}
            </td>

            <td class="text-muted text-truncate erp-truncate">
              {{ c.direccion || '-' }}
            </td>

            <!-- ACTIONS -->
            <td class="text-center pe-4">
              <button
                class="btn btn-light btn-sm border rounded-3"
                (click)="eliminar(c.id)"
                title="Eliminar"
              >
                <i class="fas fa-trash text-danger"></i>
              </button>
            </td>
          </tr>

          <!-- EMPTY -->
          <tr *ngIf="!clientes || clientes.length === 0">
            <td colspan="6" class="text-center py-5 text-muted">
              <i class="fas fa-inbox fa-lg mb-2 d-block"></i>

              No hay clientes registrados
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </article>
</section>
