<section class="container-fluid py-4 bg-body-tertiary min-vh-100">
  <article
    class="card border-0 shadow-sm rounded-4 overflow-hidden mx-auto"
    style="max-width: 850px"
  >
    <!-- HEADER -->
    <header class="card-header bg-white border-bottom px-4 py-3">
      <h4 class="mb-1 fw-semibold">Nuevo cliente</h4>

      <small class="text-muted"> Registro de clientes del sistema </small>
    </header>

    <!-- FORM -->
    <form class="card-body p-4">
      <div class="d-grid gap-4">
        <!-- DATOS PRINCIPALES -->
        <section class="erp-panel">
          <h6 class="erp-section-title">Información general</h6>

          <div class="row g-3">
            <!-- RTN -->
            <div class="col-md-4">
              <label class="form-label"> RTN * </label>

              <input [(ngModel)]="cliente.rtn" name="rtn" class="form-control" />
            </div>

            <!-- NOMBRE -->
            <div class="col-md-8">
              <label class="form-label"> Nombre * </label>

              <input [(ngModel)]="cliente.nombre" name="nombre" class="form-control" />
            </div>

            <!-- CORREO -->
            <div class="col-md-6">
              <label class="form-label"> Correo * </label>

              <input [(ngModel)]="cliente.correo" name="correo" class="form-control" />
            </div>

            <!-- TELÉFONO -->
            <div class="col-md-6">
              <label class="form-label"> Teléfono </label>

              <input [(ngModel)]="cliente.telefono" name="telefono" class="form-control" />
            </div>

            <!-- DIRECCIÓN -->
            <div class="col-12">
              <label class="form-label"> Dirección </label>

              <textarea
                [(ngModel)]="cliente.direccion"
                name="direccion"
                rows="3"
                class="form-control"
              ></textarea>
            </div>
          </div>
        </section>

        <!-- ACTIONS -->
        <footer class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-light border rounded-3 px-4">Cancelar</button>

          <button type="button" class="btn btn-primary rounded-3 px-4" (click)="guardar()">
            <i class="fas fa-user-plus me-2"></i>
            Guardar cliente
          </button>
        </footer>
      </div>
    </form>
  </article>
</section>
