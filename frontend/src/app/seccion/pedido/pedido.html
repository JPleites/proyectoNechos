<div class="nap-layout" [class.sidebar-open]="sidebarOpen">
  <aside class="nap-sidebar" [class.collapsed]="!sidebarOpen">
    <div class="sidebar-inner">
      <!-- TOGGLE -->
      <button class="sidebar-toggle" (click)="sidebarOpen = !sidebarOpen" title="Menú">
        <i class="fas fa-bars"></i>
      </button>

      <!-- BRAND (¡Con su logo premium integrado! :3) -->
      <div class="sidebar-brand" *ngIf="sidebarOpen">
        <img src="/nechologo1.png" alt="Necho's Logo" class="brand-logo" />
        <span class="brand-text">Necho's</span>
        <span class="brand-sub">Auto Parts</span>
      </div>

      <!-- NAV -->
      <nav class="sidebar-nav">
        <button class="nav-item" routerLink="nuevo-pedido" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <i class="fas fa-cart-plus nav-icon"></i>
          <span class="nav-label" *ngIf="sidebarOpen">Crear Pedido</span>
        </button>

        <button class="nav-item" routerLink="consultar-pedidos" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <i class="fas fa-list-alt nav-icon"></i>
          <span class="nav-label" *ngIf="sidebarOpen">Consultar Pedidos</span>
        </button>
      </nav>

      <!-- BACK -->
      <button class="btn-back" (click)="onBack()">
        <i class="fas fa-sign-out-alt nav-icon"></i>
        <span class="nav-label" *ngIf="sidebarOpen">Regresar</span>
      </button>
    </div>
  </aside>

  <main>
    <router-outlet></router-outlet>
  </main>

  <!-- Capa oscura flotante para móviles -->
  <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="sidebarOpen = false"></div>
</div>
