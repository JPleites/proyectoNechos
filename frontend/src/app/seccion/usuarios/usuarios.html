<div class="nap-layout" [class.sidebar-open]="sidebarOpen">
  
  <!-- Fondo oscuro para celulares cuando el menú esté abierto -->
  <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="sidebarOpen = false"></div>

  <aside class="nap-sidebar" [class.collapsed]="!sidebarOpen">
    <div class="sidebar-inner">
      <!-- TOGGLE -->
      <button class="sidebar-toggle" (click)="sidebarOpen = !sidebarOpen" title="Menú">
        <i class="fas" [ngClass]="sidebarOpen ? 'fa-times' : 'fa-bars'"></i>
      </button>

      <!-- BRAND (¡Con el logo lindo de la empresa!) -->
      <div class="sidebar-brand" *ngIf="sidebarOpen">
        <img src="/nechologo1.png" alt="Necho's Logo" class="brand-logo" />
        <span class="brand-text">Necho's</span>
        <span class="brand-sub">Auto Parts</span>
      </div>

      <!-- NAV -->
      <nav class="sidebar-nav">
        <button class="nav-item" routerLink="crear-perfil" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <i class="fas fa-id-card nav-icon"></i>
          <span class="nav-label" *ngIf="sidebarOpen">Crear perfil</span>
        </button>

        <button class="nav-item" routerLink="lista-perfil" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <i class="fas fa-address-book nav-icon"></i>
          <span class="nav-label" *ngIf="sidebarOpen">Lista perfiles</span>
        </button>
      </nav>

      <!-- BACK -->
      <button class="btn-back" (click)="onBack()">
        <i class="fas fa-sign-out-alt nav-icon"></i>
        <span class="nav-label" *ngIf="sidebarOpen">Regresar</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
