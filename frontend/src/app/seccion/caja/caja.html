<div class="nap-layout" [class.sidebar-open]="sidebarOpen">

  <aside class="nap-sidebar" [class.collapsed]="!sidebarOpen">
    <div class="sidebar-inner">

      <button class="sidebar-toggle" (click)="sidebarOpen = !sidebarOpen" title="Menú">
        <span class="toggle-icon">☰</span>
      </button>

      <div class="sidebar-brand" *ngIf="sidebarOpen">
        <span class="brand-text">Necho's</span>
        <span class="brand-sub">Auto Parts</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item" routerLink="consulta-pedidos" routerLinkActive="active">
          <img src="/usuario.png" class="nav-icon" alt="Example 1">
          <span class="nav-label" *ngIf="sidebarOpen">Ver lista de pedidos</span>
        </button>
        <button class="nav-item" routerLink="cobro">
          <img src="/productos.png" class="nav-icon" alt="Example 2">
          <span class="nav-label" *ngIf="sidebarOpen">Cobro</span>
        </button>
      </nav>

      <button class="btn-back" (click)="onBack()">
        <img src="/logout.png" class="nav-icon" alt="Regresar">
        <span class="nav-label" *ngIf="sidebarOpen">Regresar</span>
      </button>

    </div>
  </aside>
  <main>
    <router-outlet></router-outlet>
  </main>
</div>
