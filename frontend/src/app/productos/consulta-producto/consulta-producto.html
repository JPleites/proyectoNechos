<div class="container py-4">
  <div class="erp-card">
    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h4 class="mb-0">Productos</h4>
        <small class="text-muted">Gestión de inventario</small>
      </div>

      <a routerLink="/productos/nuevo" class="erp-btn">
        <i class="fas fa-plus me-2"></i>
        Nuevo Producto
      </a>
    </div>
    <input type="text" [(ngModel)]="busqueda" (input)="buscar()" placeholder="Buscar producto..." />

    <button (click)="buscar()">Buscar</button>

    <!-- TABLE -->
    <div class="table-responsive">
      <table class="erp-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Marca</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let p of productos">
            <td class="fw-semibold">{{ p.codigo }}</td>
            <td>{{ p.producto }}</td>
            <td>${{ p.precio }}</td>
            <td>{{ p.marca || '-' }}</td>

            <td class="text-center">
              <button class="erp-btn-danger" (click)="eliminar(p.codigo)">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
